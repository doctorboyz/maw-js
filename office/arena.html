<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARRA Office — 3D Arena</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; font-family: 'SF Mono', monospace; }
  #canvas-container { width: 100vw; height: 100vh; }

  /* Top bar */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    background: rgba(10,10,15,0.8); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    padding: 10px 20px; display: flex; align-items: center; gap: 16px;
  }
  #topbar .title { color: #64b5f6; font-weight: bold; letter-spacing: 4px; font-size: 13px; }
  #topbar .stats { color: rgba(255,255,255,0.3); font-size: 11px; }
  #topbar a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 11px; margin-left: auto; }
  #topbar a:hover { color: #64b5f6; }

  /* Labels */
  .agent-label {
    position: absolute; pointer-events: none; transform: translate(-50%, -100%);
    font-size: 10px; font-family: 'SF Mono', monospace; white-space: nowrap;
    padding: 2px 6px; border-radius: 4px; background: rgba(0,0,0,0.7);
  }
  .agent-label .name { color: #e2e8f0; }
  .agent-label .status { font-size: 8px; margin-left: 4px; }

  /* Connection */
  #connection {
    position: fixed; bottom: 16px; left: 16px; z-index: 10;
    font-size: 10px; color: rgba(255,255,255,0.2);
  }
  #connection.connected { color: #22c55e; }
  #connection.disconnected { color: #ef4444; }
</style>
</head>
<body>

<div id="topbar">
  <span class="title">ARRA OFFICE</span>
  <span class="stats" id="agent-count">0 agents</span>
  <a href="/">← Dashboard</a>
</div>

<div id="canvas-container"></div>
<div id="connection" class="disconnected">disconnected</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===== CONFIG =====
const WS_URL = `ws://${location.hostname}:${location.port || 3456}/ws`;
const FLOOR_SIZE = 30;
const DESK_SPACING = 3.5;
const STATUS_COLORS = {
  busy: 0xffa726,
  ready: 0x22c55e,
  idle: 0x666666,
  crashed: 0xef4444,
};
const SESSION_COLORS = [
  0x64b5f6, 0x4ade80, 0xfbbf24, 0xf87171, 0xc084fc,
  0x22d3ee, 0xfb923c, 0xf472b6, 0xa78bfa, 0x34d399,
];

// ===== STATE =====
let scene, camera, renderer, controls;
const agents = new Map(); // target → { mesh, label, data }
const sessionPositions = new Map(); // session → { cx, cz }
const clock = new THREE.Clock();
let ws = null;

// ===== INIT =====
function init() {
  const container = document.getElementById('canvas-container');

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);
  scene.fog = new THREE.FogExp2(0x0a0a0f, 0.025);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.5, 200);
  camera.position.set(20, 18, 20);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  container.appendChild(renderer.domElement);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 0);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.maxPolarAngle = Math.PI / 2.5;
  controls.minDistance = 8;
  controls.maxDistance = 60;

  // Lighting
  const hemi = new THREE.HemisphereLight(0xc8d8f0, 0x444466, 1.5);
  scene.add(hemi);

  const dir = new THREE.DirectionalLight(0xffeedd, 2);
  dir.position.set(10, 20, 15);
  dir.castShadow = true;
  dir.shadow.camera.top = 20; dir.shadow.camera.bottom = -20;
  dir.shadow.camera.left = -20; dir.shadow.camera.right = 20;
  dir.shadow.mapSize.set(2048, 2048);
  scene.add(dir);

  const rim = new THREE.DirectionalLight(0x64b5f6, 0.5);
  rim.position.set(-10, 5, -10);
  scene.add(rim);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(FLOOR_SIZE * 2, FLOOR_SIZE * 2);
  const floorMat = new THREE.MeshPhongMaterial({ color: 0x12121c, depthWrite: false });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // Grid
  const grid = new THREE.GridHelper(FLOOR_SIZE * 2, FLOOR_SIZE * 2, 0x1a1a2e, 0x16162a);
  grid.material.opacity = 0.3;
  grid.material.transparent = true;
  scene.add(grid);

  // Center hub ring
  const hubGeo = new THREE.RingGeometry(2.5, 2.8, 32);
  const hubMat = new THREE.MeshBasicMaterial({ color: 0x64b5f6, side: THREE.DoubleSide, transparent: true, opacity: 0.15 });
  const hub = new THREE.Mesh(hubGeo, hubMat);
  hub.rotation.x = -Math.PI / 2;
  hub.position.y = 0.02;
  scene.add(hub);

  // Center label
  const hubLabel = new THREE.Mesh(
    new THREE.RingGeometry(0.3, 0.5, 6),
    new THREE.MeshBasicMaterial({ color: 0x64b5f6, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
  );
  hubLabel.rotation.x = -Math.PI / 2;
  hubLabel.position.y = 0.03;
  scene.add(hubLabel);

  // Build desk clusters
  buildOffice();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  connectWS();
  animate();
}

// ===== OFFICE FURNITURE =====
function createDesk(x, z, rotation = 0) {
  const group = new THREE.Group();

  // Desktop
  const top = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.06, 0.7),
    new THREE.MeshPhongMaterial({ color: 0x2a2a3a })
  );
  top.position.y = 0.7;
  top.castShadow = true;
  group.add(top);

  // Legs
  const legGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.7);
  const legMat = new THREE.MeshPhongMaterial({ color: 0x444466 });
  [[-0.5, -0.3], [0.5, -0.3], [-0.5, 0.3], [0.5, 0.3]].forEach(([lx, lz]) => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(lx, 0.35, lz);
    group.add(leg);
  });

  // Monitor
  const monitor = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.35, 0.03),
    new THREE.MeshPhongMaterial({ color: 0x0a0a12, emissive: 0x111122, emissiveIntensity: 0.3 })
  );
  monitor.position.set(0, 0.95, -0.15);
  group.add(monitor);

  group.position.set(x, 0, z);
  group.rotation.y = rotation;
  return group;
}

function createChair(x, z, rotation = 0) {
  const group = new THREE.Group();
  const seat = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.05, 0.4),
    new THREE.MeshPhongMaterial({ color: 0x333355 })
  );
  seat.position.y = 0.45;
  group.add(seat);

  const back = new THREE.Mesh(
    new THREE.BoxGeometry(0.4, 0.35, 0.05),
    new THREE.MeshPhongMaterial({ color: 0x333355 })
  );
  back.position.set(0, 0.65, -0.17);
  group.add(back);

  group.position.set(x, 0, z);
  group.rotation.y = rotation;
  return group;
}

function buildOffice() {
  // Desk clusters — 4 groups arranged around center
  const clusters = [
    { cx: -6, cz: -6 },
    { cx: 6, cz: -6 },
    { cx: -6, cz: 6 },
    { cx: 6, cz: 6 },
    { cx: 0, cz: -10 },
    { cx: 0, cz: 10 },
  ];

  clusters.forEach(({ cx, cz }) => {
    // 4 desks per cluster (2x2)
    for (let dx = -1; dx <= 1; dx += 2) {
      for (let dz = -1; dz <= 1; dz += 2) {
        const rotation = dz > 0 ? 0 : Math.PI;
        scene.add(createDesk(cx + dx * 1, cz + dz * 0.8, rotation));
        scene.add(createChair(cx + dx * 1, cz + dz * 1.4, rotation));
      }
    }
  });

  // Meeting table (center-right)
  const tableMat = new THREE.MeshPhongMaterial({ color: 0x2a2a3a });
  const table = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 1.5, 0.08, 16), tableMat);
  table.position.set(12, 0.7, 0);
  table.castShadow = true;
  scene.add(table);

  // Couch area (left)
  const couchMat = new THREE.MeshPhongMaterial({ color: 0x3a2a4a });
  const couch = new THREE.Mesh(new THREE.BoxGeometry(3, 0.5, 1), couchMat);
  couch.position.set(-12, 0.4, 0);
  scene.add(couch);
  const couchBack = new THREE.Mesh(new THREE.BoxGeometry(3, 0.6, 0.2), couchMat);
  couchBack.position.set(-12, 0.6, -0.4);
  scene.add(couchBack);

  // Walls (transparent glass)
  const wallMat = new THREE.MeshPhongMaterial({ color: 0x64b5f6, transparent: true, opacity: 0.05, side: THREE.DoubleSide });
  const wallGeo = new THREE.PlaneGeometry(FLOOR_SIZE * 2, 3);

  [[-FLOOR_SIZE, 0], [FLOOR_SIZE, 0], [0, -FLOOR_SIZE], [0, FLOOR_SIZE]].forEach(([x, z], i) => {
    const wall = new THREE.Mesh(wallGeo, wallMat);
    wall.position.set(x, 1.5, z);
    if (i < 2) wall.rotation.y = Math.PI / 2;
    scene.add(wall);
  });
}

// ===== AGENT CHARACTERS =====
function createAgentMesh(name, status, sessionIndex) {
  const group = new THREE.Group();
  const color = STATUS_COLORS[status] || 0x666666;
  const sessionColor = SESSION_COLORS[sessionIndex % SESSION_COLORS.length];

  // Body (capsule-like)
  const body = new THREE.Mesh(
    new THREE.CapsuleGeometry(0.25, 0.5, 4, 8),
    new THREE.MeshPhongMaterial({ color: sessionColor, emissive: color, emissiveIntensity: 0.3 })
  );
  body.position.y = 0.7;
  body.castShadow = true;
  group.add(body);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshPhongMaterial({ color: 0xe8d4b8 })
  );
  head.position.y = 1.25;
  head.castShadow = true;
  group.add(head);

  // Status indicator (glowing ring at feet)
  const ring = new THREE.Mesh(
    new THREE.RingGeometry(0.3, 0.4, 16),
    new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity: 0.6 })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.02;
  group.add(ring);

  // Store refs
  group.userData = { body, ring, name, status, targetY: 0 };
  return group;
}

function getAgentPosition(sessionName, windowIndex, totalInSession) {
  if (!sessionPositions.has(sessionName)) {
    const idx = sessionPositions.size;
    const angle = (idx / 8) * Math.PI * 2 - Math.PI / 2;
    const radius = 8 + Math.floor(idx / 8) * 6;
    sessionPositions.set(sessionName, {
      cx: Math.cos(angle) * radius,
      cz: Math.sin(angle) * radius,
    });
  }
  const { cx, cz } = sessionPositions.get(sessionName);
  const subAngle = (windowIndex / Math.max(totalInSession, 1)) * Math.PI * 2;
  const subRadius = Math.min(2, 0.8 + totalInSession * 0.3);
  return {
    x: cx + Math.cos(subAngle) * subRadius,
    z: cz + Math.sin(subAngle) * subRadius,
  };
}

function updateAgent(data) {
  const key = data.target;
  let agent = agents.get(key);
  const sessionIndex = [...new Set([...agents.values()].map(a => a.data?.session))].indexOf(data.session);

  if (!agent) {
    const mesh = createAgentMesh(data.name, data.status, sessionIndex >= 0 ? sessionIndex : agents.size);
    scene.add(mesh);

    // HTML label
    const label = document.createElement('div');
    label.className = 'agent-label';
    label.innerHTML = `<span class="name">${data.name.replace(/-oracle$/, '').replace(/-/g, ' ')}</span>`;
    document.body.appendChild(label);

    agent = { mesh, label, data };
    agents.set(key, agent);
  }

  // Update data
  agent.data = data;

  // Update colors
  const color = STATUS_COLORS[data.status] || 0x666666;
  agent.mesh.userData.ring.material.color.setHex(color);
  agent.mesh.userData.body.material.emissive.setHex(color);

  // Update label status
  const statusColor = data.status === 'busy' ? '#ffa726' : data.status === 'ready' ? '#22c55e' : data.status === 'crashed' ? '#ef4444' : '#666';
  agent.label.innerHTML = `<span class="name">${data.name.replace(/-oracle$/, '').replace(/-/g, ' ')}</span><span class="status" style="color:${statusColor}">●</span>`;
}

function removeStaleAgents(activeSessions) {
  const activeTargets = new Set();
  activeSessions.forEach(s => s.windows.forEach(w => activeTargets.add(`${s.name}:${w.index}`)));

  for (const [key, agent] of agents) {
    if (!activeTargets.has(key)) {
      scene.remove(agent.mesh);
      agent.label.remove();
      agents.delete(key);
    }
  }
}

// ===== WEBSOCKET =====
function connectWS() {
  const connEl = document.getElementById('connection');
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    connEl.textContent = 'connected';
    connEl.className = 'connected';
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'sessions') {
        const sessions = msg.sessions || [];
        let total = 0;

        sessions.forEach((s, si) => {
          (s.windows || []).forEach((w, wi) => {
            total++;
            updateAgent({
              target: `${s.name}:${w.index}`,
              name: w.name,
              session: s.name,
              windowIndex: w.index,
              status: 'idle', // default, updated by capture
              active: w.active,
            });
          });
        });

        removeStaleAgents(sessions);
        document.getElementById('agent-count').textContent = `${total} agents · ${sessions.length} rooms`;
      }

      if (msg.type === 'capture' && msg.statuses) {
        for (const [target, info] of Object.entries(msg.statuses)) {
          const agent = agents.get(target);
          if (agent && info.status) {
            agent.data.status = info.status;
            const color = STATUS_COLORS[info.status] || 0x666666;
            agent.mesh.userData.ring.material.color.setHex(color);
            agent.mesh.userData.body.material.emissive.setHex(color);
          }
        }
      }
    } catch {}
  };

  ws.onclose = () => {
    connEl.textContent = 'disconnected';
    connEl.className = 'disconnected';
    setTimeout(connectWS, 3000);
  };
}

// ===== ANIMATION =====
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const t = clock.getElapsedTime();

  // Update agent positions + animations
  let idx = 0;
  for (const [key, agent] of agents) {
    const { mesh, label, data } = agent;

    // Calculate target position
    const sessAgents = [...agents.values()].filter(a => a.data.session === data.session);
    const myIdx = sessAgents.indexOf(agent);
    const pos = getAgentPosition(data.session, myIdx, sessAgents.length);

    // Smooth move
    mesh.position.x += (pos.x - mesh.position.x) * 2 * dt;
    mesh.position.z += (pos.z - mesh.position.z) * 2 * dt;

    // Busy = bob up/down, idle = still
    if (data.status === 'busy') {
      mesh.userData.body.position.y = 0.7 + Math.sin(t * 3 + idx) * 0.05;
      mesh.userData.ring.material.opacity = 0.4 + Math.sin(t * 4 + idx) * 0.3;
    } else {
      mesh.userData.body.position.y = 0.7;
      mesh.userData.ring.material.opacity = 0.3;
    }

    // Update HTML label position
    const pos3d = new THREE.Vector3(mesh.position.x, 1.6, mesh.position.z);
    pos3d.project(camera);
    const x = (pos3d.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-pos3d.y * 0.5 + 0.5) * window.innerHeight;
    if (pos3d.z < 1) {
      label.style.left = x + 'px';
      label.style.top = y + 'px';
      label.style.display = 'block';
    } else {
      label.style.display = 'none';
    }

    idx++;
  }

  controls.update();
  renderer.render(scene, camera);
}

// ===== START =====
init();
</script>
</body>
</html>
