name: Publish SDK

on:
  push:
    tags:
      - 'sdk-v*'

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches package version
        run: |
          TAG="${GITHUB_REF_NAME#sdk-v}"
          PKG=$(node -p "require('./packages/sdk/package.json').version")
          echo "Tag version: $TAG"
          echo "Package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: tag sdk-v$TAG does not match packages/sdk version $PKG"
            exit 1
          fi

  publish:
    runs-on: ubuntu-latest
    needs: verify-version
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SDK tests
        run: bun test packages/sdk/

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish @maw/sdk
        working-directory: packages/sdk
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
